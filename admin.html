<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel Admin</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;padding:30px;background:#f4f4f4}
.usuario{background:white;padding:15px;margin-bottom:10px;border-radius:6px}
button{padding:6px 10px;margin-right:5px}
</style>
</head>

<body>

<h2>Painel ADMIN</h2>

<div id="usuarios"></div>

<script>

const firebaseConfig = {
   apiKey: "AIzaSyANepb8uTCw_Yh43JweTqmAIk0QaH4WvTI",
  authDomain: "pelada-kf.firebaseapp.com",
  projectId: "pelada-kf",
  storageBucket: "pelada-kf.firebasestorage.app",
  messagingSenderId: "588759368300",
  appId: "1:588759368300:web:bf2ecccf9e906635f10e49"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

async function carregarUsuarios(){

 const lista = document.getElementById("usuarios");
 lista.innerHTML="Carregando...";

 const snap = await db.collection("usuarios").get();

 lista.innerHTML="";

 snap.forEach(doc=>{

   const d = doc.data();

   const status = d.planoFinanceiro ? "ATIVO" : "BLOQUEADO";

   const div = document.createElement("div");
   div.className="usuario";

   div.innerHTML = `
   <b>${d.email}</b><br>
   Financeiro: ${status}<br><br>
   <button onclick="ativar('${doc.id}')">Ativar</button>
   <button onclick="desativar('${doc.id}')">Desativar</button>
   `;

   lista.appendChild(div);

 });

}

async function ativar(uid){

 await db.collection("usuarios").doc(uid).update({
   planoFinanceiro:true
 });

 carregarUsuarios();

}

async function desativar(uid){

 await db.collection("usuarios").doc(uid).update({
   planoFinanceiro:false
 });

 carregarUsuarios();

}

carregarUsuarios();

</script>

</body>
</html>
